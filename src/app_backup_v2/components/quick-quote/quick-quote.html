<div class="quick-quote-trigger" (click)="openModal()">
    <i class="fa-solid fa-calculator"></i>
    <span>Quick Quote</span>
</div>

<div class="quote-modal" *ngIf="showModal" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2>Get a Quick Quote</h2>
            <button class="close-btn" (click)="closeModal()">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        
        <div class="modal-body">
            <p class="subtitle">Fill in the details below and we'll send you a customized quote via WhatsApp</p>
            
            <form (ngSubmit)="submitQuote()">
                <div class="form-group">
                    <label>Service Needed *</label>
                    <select [(ngModel)]="quoteData.service" name="service" required>
                        <option value="">Select a service</option>
                        <option *ngFor="let service of services" [value]="service">{{ service }}</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Company Size</label>
                    <select [(ngModel)]="quoteData.companySize" name="companySize">
                        <option value="">Select size</option>
                        <option *ngFor="let size of companySizes" [value]="size">{{ size }}</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Timeline</label>
                    <select [(ngModel)]="quoteData.timeline" name="timeline">
                        <option value="">Select timeline</option>
                        <option *ngFor="let timeline of timelines" [value]="timeline">{{ timeline }}</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Budget Range</label>
                    <input type="text" [(ngModel)]="quoteData.budget" name="budget" 
                           placeholder="e.g., $5,000 - $10,000">
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" [(ngModel)]="quoteData.email" name="email" 
                           placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" [(ngModel)]="quoteData.phone" name="phone" 
                           placeholder="+1 234 567 8900">
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fa-brands fa-whatsapp"></i>
                    Get Quote via WhatsApp
                </button>
            </form>
        </div>
    </div>
</div>
