<section class="cli-section">
    <div class="container">
        <div class="cli-terminal shadow-premium">
            <div class="terminal-header">
                <div class="dots">
                    <span></span><span></span><span></span>
                </div>
                <div class="terminal-title">arbor-sh — -bash — 80x24</div>
            </div>
            <div class="terminal-body">
                <div *ngFor="let line of lines" [className]="'line ' + line.type">
                    <span *ngIf="line.type === 'cmd'" class="prompt">$</span> {{ line.text }}
                </div>
                <div class="line active">
                    <span class="prompt">$</span> <span class="cursor">_</span>
                </div>
            </div>
            <div class="cli-cta">
                <h3>Developer-First Infrastructure</h3>
                <p>Deploy complex architectures with a single command. Built for engineers, by engineers.</p>
                <a href="#contact" class="btn btn-secondary">Read CLI Docs</a>
            </div>
        </div>
    </div>
</section>
