<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" /> <!-- Cyan -->
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" /> <!-- Purple -->
    </linearGradient>
  </defs>
  <!-- Circuit Tree Styling -->
  <g stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Trunk -->
    <path d="M50 90 L50 60" />
    <path d="M40 90 L50 60 L60 90" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Branches Left -->
    <path d="M50 60 L30 40 L30 20" />
    <path d="M30 40 L10 40" />
    <path d="M30 30 L20 20" />
    <circle cx="10" cy="40" r="2" fill="url(#grad1)" stroke="none"/>
    <circle cx="30" cy="20" r="2" fill="url(#grad1)" stroke="none"/>
    <circle cx="20" cy="20" r="2" fill="url(#grad1)" stroke="none"/>

    <!-- Branches Right -->
    <path d="M50 60 L70 40 L70 20" />
    <path d="M70 40 L90 40" />
    <path d="M70 30 L80 20" />
    <circle cx="90" cy="40" r="2" fill="url(#grad1)" stroke="none"/>
    <circle cx="70" cy="20" r="2" fill="url(#grad1)" stroke="none"/>
    <circle cx="80" cy="20" r="2" fill="url(#grad1)" stroke="none"/>
    
    <!-- Center Branch -->
    <path d="M50 60 L50 20" />
    <circle cx="50" cy="20" r="2" fill="url(#grad1)" stroke="none"/>
    
    <!-- Circuit Dots -->
    <path d="M40 50 L30 50 L30 60" />
    <circle cx="30" cy="60" r="2" fill="url(#grad1)" stroke="none"/>
    
    <path d="M60 50 L70 50 L70 60" />
    <circle cx="70" cy="60" r="2" fill="url(#grad1)" stroke="none"/>
  </g>
  
  <!-- Base Line -->
  <path d="M35 90 L65 90" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
</svg>
